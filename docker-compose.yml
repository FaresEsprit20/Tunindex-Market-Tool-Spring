

services:
  # FlareSolverr service - bypasses Cloudflare
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:${FLARESOLVERR_VERSION:-latest}
    container_name: flaresolverr
    restart: unless-stopped
    ports:
      - "${FLARESOLVERR_PORT:-8191}:8191"
    environment:
      - LOG_LEVEL=${FLARESOLVERR_LOG_LEVEL:-info}
      - CAPTCHA_SOLVER=${FLARESOLVERR_CAPTCHA_SOLVER:-none}
      - HEADLESS=${FLARESOLVERR_HEADLESS:-true}
    networks:
      - market-tool-network

  # Your Java Spring Boot application (optional - if you want to run it in Docker)
  market-tool:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: market-tool
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8082}:8082"
    depends_on:
      - flaresolverr
    environment:
      - FLARESOLVERR_URL=http://flaresolverr:${FLARESOLVERR_PORT:-8191}
      - JAVA_OPTS=${JAVA_OPTS:--Xms256m -Xmx512m}
    networks:
      - market-tool-network

networks:
  market-tool-network:
    driver: bridge