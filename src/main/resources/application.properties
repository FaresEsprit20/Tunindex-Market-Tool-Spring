# ========================
# APPLICATION
# ========================
spring.application.name=market-tool
server.port=8082

# ========================
# ACTIVE PROVIDER
# ========================
market-tool.provider.active=investingcom

# ========================
# DATABASE
# ========================
spring.datasource.url=jdbc:postgresql://localhost:5432/tunindex
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ========================
# SCRAPING SETTINGS
# ========================
market-tool.scraping.use-browser=true
market-tool.scraping.request-timeout=10
market-tool.scraping.retry-count=3
market-tool.scraping.rate-limit-delay=3000
market-tool.scraping.retry-delay=1000

# ========================
# PROXY SETTINGS
# ========================
market-tool.scraping.use-proxy=true
market-tool.proxy.auto-load=true
market-tool.proxy.api-url=https://www.proxy-list.download/api/v1/get?type=http
market-tool.proxy.validation-timeout=10000

# ========================
# STEALTH SETTINGS
# ========================
market-tool.stealth.enabled=true
market-tool.stealth.rotate-user-agent=true
market-tool.stealth.rotate-fingerprint=true
market-tool.stealth.detect-captcha=true
market-tool.stealth.user-agent-file=stealth/user-agents.txt
market-tool.stealth.fingerprint-file=stealth/browser-profiles.json

# ========================
# RETRY SETTINGS
# ========================
market-tool.retry.max-attempts=3
market-tool.retry.initial-delay-ms=1000
market-tool.retry.max-delay-ms=10000
market-tool.retry.multiplier=2.0

# ========================
# RATE LIMIT SETTINGS
# ========================
market-tool.rate-limit.enabled=true
market-tool.rate-limit.delay-ms=1500
market-tool.rate-limit.requests-per-minute=40
market-tool.rate-limit.requests-per-hour=240

# ========================
# CACHE SETTINGS
# ========================
market-tool.cache.ttl=3600

# ========================
# PARALLELISM SETTINGS
# ========================
market-tool.parallelism.max-workers=10
market-tool.parallelism.bvps-skip-if-exists=true

# ========================
# WEB CLIENT SETTINGS
# ========================
spring.webflux.client.read-timeout=30000
spring.webflux.client.connect-timeout=10000

# ========================
# INVESTING.COM SETTINGS
# ========================
investingcom.base-url=https://www.investing.com
investingcom.rate-limit-per-minute=10
investingcom.timeout=30000

# ========================
# OWNERSHIP MAPPING
# ========================
market-tool.ownership.government=STB,BH,BNA
market-tool.ownership.mixed=BIAT,UIB,ATB,UBCI

# ========================
# SCHEDULER SETTINGS
# ========================
spring.task.scheduling.pool.size=5
spring.task.scheduling.thread-name-prefix=scheduler-

# Scheduler Configuration
market-tool.scheduler.interval-minutes=30
market-tool.scheduler.run-on-startup=true
market-tool.scheduler.initial-delay-seconds=2


# ========================
# LOGGING
# ========================
logging.level.com.tunindex.market_tool=INFO
logging.level.com.tunindex.market_tool.client=DEBUG
logging.level.com.tunindex.market_tool.service.stealth=DEBUG
logging.level.org.springframework.web.reactive.function.client=WARN


# FlareSolverr Configuration (use environment variable for Docker)
flaresolverr.url=http://localhost:8191
flaresolverr.timeout=120000