# Application
spring.application.name=market-tool
server.port=8082

# ========================
# ACTIVE PROVIDER
# ========================
market-tool.provider.active=investingcom

# ========================
# DATABASE
# ========================
spring.datasource.url=jdbc:postgresql://localhost:5432/tunindex
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ========================
# SCRAPING SETTINGS
# ========================
market-tool.scraping.use-proxy=false
market-tool.scraping.use-browser=true
market-tool.scraping.request-timeout=10
market-tool.scraping.retry-count=3
market-tool.scraping.rate-limit-delay=1500

# ========================
# CACHE
# ========================
market-tool.cache.ttl=3600

# ========================
# PARALLELISM
# ========================
market-tool.parallelism.max-workers=10
market-tool.parallelism.bvps-skip-if-exists=true

# ========================
# LOGGING
# ========================
logging.level.com.tunindex.market_tool=INFO
logging.level.com.tunindex.market_tool.client=DEBUG
logging.level.com.tunindex.market_tool.service.stealth=DEBUG